services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: graphrag-postgres
    environment:
      POSTGRES_USER: ${APP_PG_USER:-graphrag_user}
      POSTGRES_PASSWORD: ${APP_PG_PASSWORD:-graphrag_pass123}
      POSTGRES_DB: ${APP_PG_DATABASE:-graphrag_db}
    ports:
      - "${APP_PG_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_PG_USER:-graphrag_user} -d ${APP_PG_DATABASE:-graphrag_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graphrag-network

  # Optional Ollama service.
  #
  # On Apple Silicon Macs, prefer running Ollama natively on macOS and leave this
  # profile disabled. Native Ollama can use Metal acceleration; Docker Desktop
  # containers generally cannot. The backend default APP_OLLAMA_BASE_URL points
  # to the native host service via host.docker.internal.
  ollama:
    image: ollama/ollama:latest
    container_name: graphrag-ollama
    profiles:
      - container-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - APP_OLLAMA_LLM_MODEL=${APP_OLLAMA_LLM_MODEL:-qwen2.5:3b}
      - APP_OLLAMA_EMBED_MODEL=${APP_OLLAMA_EMBED_MODEL:-nomic-embed-text}
    entrypoint: []
    command:
      [
        "sh",
        "-c",
        "ollama serve & sleep 5 && (ollama pull $${APP_OLLAMA_LLM_MODEL} || echo 'Failed to pull LLM model') && (ollama pull $${APP_OLLAMA_EMBED_MODEL} || echo 'Failed to pull embedding model') && wait",
      ]
    restart: unless-stopped
    networks:
      - graphrag-network

  # Backend Application
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: graphrag-backend
    environment:
      - APP_DATABASE_URL=postgresql://${APP_PG_USER:-graphrag_user}:${APP_PG_PASSWORD:-graphrag_pass123}@postgres:5432/${APP_PG_DATABASE:-graphrag_db}
      # Model provider configuration
      - APP_MODEL_PROVIDER=${APP_MODEL_PROVIDER:-ollama}
      - APP_INDEX_MODEL_PROVIDER=${APP_INDEX_MODEL_PROVIDER:-}
      - APP_INDEX_CHAT_PROVIDER=${APP_INDEX_CHAT_PROVIDER:-}
      - APP_INDEX_EMBED_PROVIDER=${APP_INDEX_EMBED_PROVIDER:-}
      - APP_QUERY_CHAT_PROVIDER=${APP_QUERY_CHAT_PROVIDER:-}
      - APP_QUERY_EMBED_PROVIDER=${APP_QUERY_EMBED_PROVIDER:-}
      # Ollama configuration
      - APP_OLLAMA_BASE_URL=${APP_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - APP_OLLAMA_LLM_MODEL=${APP_OLLAMA_LLM_MODEL:-qwen2.5:3b}
      - APP_OLLAMA_EMBED_MODEL=${APP_OLLAMA_EMBED_MODEL:-nomic-embed-text}
      # Gemini configuration (only required when APP_MODEL_PROVIDER=gemini)
      - APP_GEMINI_API_KEY=${APP_GEMINI_API_KEY:-}
      - APP_GEMINI_LLM_MODEL=${APP_GEMINI_LLM_MODEL:-gemini-3.1-flash-lite}
      - APP_GEMINI_EMBED_MODEL=${APP_GEMINI_EMBED_MODEL:-gemini-embedding-2}
      - APP_GEMINI_FREE_TIER_GUARD_ENABLED=${APP_GEMINI_FREE_TIER_GUARD_ENABLED:-true}
      - APP_GEMINI_FREE_TIER_QUERY_RPM=${APP_GEMINI_FREE_TIER_QUERY_RPM:-7}
      - APP_GEMINI_FREE_TIER_QUERY_TPM=${APP_GEMINI_FREE_TIER_QUERY_TPM:-120000}
      - APP_GEMINI_FREE_TIER_QUERY_RPD=${APP_GEMINI_FREE_TIER_QUERY_RPD:-500}
      - APP_GEMINI_FREE_TIER_INDEX_GUARD_ENABLED=${APP_GEMINI_FREE_TIER_INDEX_GUARD_ENABLED:-true}
      - APP_GEMINI_FREE_TIER_INDEX_RPM=${APP_GEMINI_FREE_TIER_INDEX_RPM:-7}
      - APP_GEMINI_FREE_TIER_INDEX_TPM=${APP_GEMINI_FREE_TIER_INDEX_TPM:-120000}
      - APP_GEMINI_FREE_TIER_INDEX_RPD=${APP_GEMINI_FREE_TIER_INDEX_RPD:-500}
      - APP_GEMINI_FREE_TIER_EMBED_GUARD_ENABLED=${APP_GEMINI_FREE_TIER_EMBED_GUARD_ENABLED:-true}
      - APP_GEMINI_FREE_TIER_EMBED_RPM=${APP_GEMINI_FREE_TIER_EMBED_RPM:-100}
      - APP_GEMINI_FREE_TIER_EMBED_TPM=${APP_GEMINI_FREE_TIER_EMBED_TPM:-30000}
      - APP_GEMINI_FREE_TIER_EMBED_RPD=${APP_GEMINI_FREE_TIER_EMBED_RPD:-1000}
      - APP_GEMINI_FREE_TIER_EMBED_BATCH_SIZE=${APP_GEMINI_FREE_TIER_EMBED_BATCH_SIZE:-16}
      - APP_GEMINI_FREE_TIER_EMBED_BATCH_MAX_TOKENS=${APP_GEMINI_FREE_TIER_EMBED_BATCH_MAX_TOKENS:-8191}
      # OpenRouter configuration (only required when an OpenRouter provider is selected)
      - APP_OPENROUTER_API_KEY=${APP_OPENROUTER_API_KEY:-}
      - APP_OPENROUTER_LLM_MODEL=${APP_OPENROUTER_LLM_MODEL:-openai/gpt-4.1-mini}
      - APP_OPENROUTER_EMBED_MODEL=${APP_OPENROUTER_EMBED_MODEL:-}
      - APP_OPENROUTER_API_BASE=${APP_OPENROUTER_API_BASE:-https://openrouter.ai/api/v1}
      # GraphRAG indexing controls
      - APP_GRAPHRAG_CONCURRENT_REQUESTS=${APP_GRAPHRAG_CONCURRENT_REQUESTS:-1}
      - APP_GRAPHRAG_MAX_RETRIES=${APP_GRAPHRAG_MAX_RETRIES:-8}
      - APP_GRAPHRAG_MAX_RETRY_WAIT=${APP_GRAPHRAG_MAX_RETRY_WAIT:-60.0}
      - APP_GRAPHRAG_INDEX_TIMEOUT_SECONDS=${APP_GRAPHRAG_INDEX_TIMEOUT_SECONDS:-7200}
      - APP_GRAPHRAG_REQUEST_TIMEOUT=${APP_GRAPHRAG_REQUEST_TIMEOUT:-600.0}
      - APP_GRAPHRAG_QUERY_TIMEOUT_SECONDS=${APP_GRAPHRAG_QUERY_TIMEOUT_SECONDS:-240}
      - APP_GRAPHRAG_CHUNK_SIZE=${APP_GRAPHRAG_CHUNK_SIZE:-1000}
      - APP_GRAPHRAG_CHUNK_OVERLAP=${APP_GRAPHRAG_CHUNK_OVERLAP:-150}
      - APP_GRAPHRAG_CLAIM_EXTRACTION_ENABLED=${APP_GRAPHRAG_CLAIM_EXTRACTION_ENABLED:-false}
      - APP_GRAPHRAG_CLEAN_OUTPUT_ON_INDEX=${APP_GRAPHRAG_CLEAN_OUTPUT_ON_INDEX:-true}
      - APP_GRAPHRAG_REPLACE_CORPUS_ON_UPLOAD=${APP_GRAPHRAG_REPLACE_CORPUS_ON_UPLOAD:-true}
      # Other settings
      - APP_GRAPHRAG_ROOT=/app/ragtest
      - APP_CORS_ORIGINS=["http://localhost:3000","http://localhost:8000"]
      - APP_DEBUG=${APP_DEBUG:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/ragtest:/app/ragtest
      - ./backend/logs:/app/logs
      - ./frontend/dist:/frontend/dist:ro
      - backend_cache:/app/.cache
    depends_on:
      - postgres
    networks:
      - graphrag-network
    restart: unless-stopped

  # Backend unit/config tests in a Linux container
  backend-test:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend-test
    profiles:
      - test
    environment:
      - APP_DATABASE_URL=postgresql://${APP_PG_USER:-graphrag_user}:${APP_PG_PASSWORD:-graphrag_pass123}@postgres:5432/${APP_PG_DATABASE:-graphrag_db}
      - APP_MODEL_PROVIDER=${APP_TEST_MODEL_PROVIDER:-ollama}
      - APP_INDEX_CHAT_PROVIDER=${APP_TEST_INDEX_CHAT_PROVIDER:-ollama}
      - APP_INDEX_EMBED_PROVIDER=${APP_TEST_INDEX_EMBED_PROVIDER:-ollama}
      - APP_QUERY_CHAT_PROVIDER=${APP_TEST_QUERY_CHAT_PROVIDER:-ollama}
      - APP_QUERY_EMBED_PROVIDER=${APP_TEST_QUERY_EMBED_PROVIDER:-ollama}
      - APP_OLLAMA_BASE_URL=${APP_TEST_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - APP_OLLAMA_LLM_MODEL=${APP_TEST_OLLAMA_LLM_MODEL:-qwen2.5:3b}
      - APP_OLLAMA_EMBED_MODEL=${APP_TEST_OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - APP_GRAPHRAG_CONCURRENT_REQUESTS=${APP_GRAPHRAG_CONCURRENT_REQUESTS:-1}
      - APP_GRAPHRAG_MAX_RETRIES=${APP_GRAPHRAG_MAX_RETRIES:-8}
      - APP_GRAPHRAG_MAX_RETRY_WAIT=${APP_GRAPHRAG_MAX_RETRY_WAIT:-60.0}
      - APP_GRAPHRAG_INDEX_TIMEOUT_SECONDS=${APP_GRAPHRAG_INDEX_TIMEOUT_SECONDS:-7200}
      - APP_GRAPHRAG_REQUEST_TIMEOUT=${APP_GRAPHRAG_REQUEST_TIMEOUT:-600.0}
      - APP_GRAPHRAG_QUERY_TIMEOUT_SECONDS=${APP_GRAPHRAG_QUERY_TIMEOUT_SECONDS:-240}
      - APP_GRAPHRAG_CHUNK_SIZE=${APP_GRAPHRAG_CHUNK_SIZE:-1000}
      - APP_GRAPHRAG_CHUNK_OVERLAP=${APP_GRAPHRAG_CHUNK_OVERLAP:-150}
      - APP_GRAPHRAG_CLAIM_EXTRACTION_ENABLED=${APP_GRAPHRAG_CLAIM_EXTRACTION_ENABLED:-false}
      - APP_GRAPHRAG_CLEAN_OUTPUT_ON_INDEX=${APP_GRAPHRAG_CLEAN_OUTPUT_ON_INDEX:-true}
      - APP_GRAPHRAG_REPLACE_CORPUS_ON_UPLOAD=${APP_GRAPHRAG_REPLACE_CORPUS_ON_UPLOAD:-true}
      - APP_GRAPHRAG_ROOT=/app/ragtest
      - APP_CORS_ORIGINS=["http://localhost:3000","http://localhost:8000"]
      - APP_DEBUG=${APP_DEBUG:-false}
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/samples:/app/samples:ro
      - ./backend/tests:/app/tests:ro
      - ./backend/ragtest:/app/ragtest
      - ./backend/logs:/app/logs
      - backend_cache:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - graphrag-network

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
  backend_cache:
    driver: local

networks:
  graphrag-network:
    driver: bridge
